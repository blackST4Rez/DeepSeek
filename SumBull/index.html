<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./CSS/main.css">
  <link rel="icon" type="image/svg" href="./src/assets/favicon.svg">
  <title>DeepSeek - Into the Unknown</title>
</head>

<body>
      
  <header id="head-container">
    <!-- Header Logo -->
    <div id="container">

      <div class="head-logo">
        <img src="./src/assets/logo.svg" alt="logo" class="form-logo">
      </div>
      

    <!-- Input Field of Form -->
            <form action="" method="GET" id="form-container">

              <div class="input-box">
                <label for="text"></label>
                <input type="text" id="text" name="text" placeholder="Phone number / Email address" class="email-field" required>
              </div>

              <div class="input-box">
                <label for="password"></label>
                <input type="password" id="password" name="password" placeholder="Password" class="pass-field" required>

              <div class="seen-icon">
                <img src="./src/assets/eye.svg" alt="see-icon" class="eye">
            
              </div>
              </div>
            </form>

      <!-- Terms & Policy -->
    
      <div class="Terms">
          <p class="sub-txt">By signing up or logging in, you consent to DeepSeek's<br> <a href="" class="terms-deco">Terms of Use</a> and <a href="" class="terms-deco">Privacy Policy</a>.</p>
      </div>

      <!-- Forgot Password & Sign Up -->
      <div class="forgot-main">

        <div class="forgot-container">
          <div class="forgot-txt">
            <a href="" class="f-txt">Forgot Password ?</a>
          </div>
          <div class="forgot-txt">
            <a href="SignUp.html" class="f-txt">Sign Up</a>
          </div>
        </div>

      </div>

      <!-- Small Login Text -->
        <div class="login-main">
          <div class="login-container">
            <a href="" class="log-txt">Log In</a>
          </div>
        </div>

        <!-- Login Options -->
        <div class="options-main">

          <div class="option-container">
            <div class="option-txt">
              Log In with Google
            </div>

            <hr class="h-line">

            <div class="option-txt">
              Log In with Apple
            </div>
          </div>

        </div>

      </div>

    </div>

  </header>

  <!-- Footer Section -->
  <footer class="footer-main">

    <div class="foot-container">
      <div class="sub-f">
        <h4 class="foot-txt">©2026 Raka Maharjan. All rights reserved.</h4>
      </div>

      <hr class="h-line">

      <div class="sub-f">
        <h4 class="foot-txt">
          Template From:
          <a href="https://chat.deepseek.com/sign_in" class="f-txt">DeepSeek.SignIn</a>
        </h4>
      </div>

      <hr class="h-line">

      <div class="div sub-f">
        <h4 class="foot-txt">Logo From:
          <a href="https://svglogos.dev/" class="f-txt">SVGLogos</a>
        </h4>
      </div>
    </div>

  </footer>

</body>

</html>
